services:
  - type: web
    name: watchtower-backend
    runtime: python 3.11
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./watchtower.db
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRY_MINUTES
        value: "1440"
